<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photomotive | Automotive Photography</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo-text">PHOTOMOTIVE</a>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li class="dropdown">
                    <span class="dropbtn nav-links">
                        <a href="#">Portfolio</a>
                        <span class="arrow">▼</span>
                    </span>
                    <div class="dropdown-content">
                        <a href="automotive.html">Automotive</a>
                        <a href="nature.html">Nature</a>
                        <a href="animals.html">Animals</a>
                    </div>
                </li>
            </ul>
        </div>
    </header>

    <main class="main-content">
        <section class="hero">
            <div class="hero-content">
                <h1>Automotive Photography & Videography</h1>
                <p>Capturing clean, high-quality street and track builds.</p>
            </div>
        </section>

        <section class="portfolio-container">
            <h2 class="page-title">Featured Work</h2>
            <div class="image-grid vertical-grid">
                <div class="grid-item">
                    <img src="images/untitled-1-14.jpg" alt="Featured Vertical Car 1">
                </div>
                <div class="grid-item">
                    <img src="images/untitled-1-3.jpg" alt="Featured Vertical Car 2">
                </div>
                <div class="grid-item">
                    <img src="images/untitled-1-6.jpg" alt="Featured Vertical Car 3">
                </div>
            </div>
        </section>

        <section class="booking-section">
            <div class="booking-header">
                <h2>Book a Session</h2>
                <p>Fill out the details below to lock in a shoot.</p>
            </div>

            <form action="https://formspree.io/f/YOUR_UNIQUE_CODE_HERE" method="POST" class="booking-form">
                
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="First and last name" required>
                </div>

                <div class="form-group">
                    <label for="instagram">Instagram Handle</label>
                    <input type="text" id="instagram" name="instagram" placeholder="@yourhandle">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label for="car-info">Vehicle Year, Make, & Model</label>
                    <input type="text" id="car-info" name="car" placeholder="e.g., 2018 Subaru STI" required>
                </div>

                <div class="form-group">
                    <label for="shoot-date">Preferred Date</label>
                    <input type="date" id="shoot-date" name="preferred_date" required>
                </div>

                <div class="form-group">
                    <label for="shoot-time">Preferred Time Slot</label>
                    <select id="shoot-time" name="preferred_time" required>
                        <option value="" disabled selected>Select a 1-hour 15 minute session block...</option>
                        <option value="11am">11:00 AM - 12:15 PM</option>
                        <option value="1pm">1 PM - 2:15 PM</option>
                        <option value="3pm">3:00 PM - 4:15 PM</option>
                        
                        <option value="7pm">7:00 PM - 9:00 PM (Night)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Shoot Details</label>
                    <textarea id="message" name="message" placeholder="Preferred locations, style of shots, or ideas..." rows="5"></textarea>
                </div>

                <button type="submit" class="submit-btn">Submit Booking Request</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Photomotive. All rights reserved.</p>
    </footer>

</body>
</html>
