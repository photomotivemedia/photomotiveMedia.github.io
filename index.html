<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Portfolio | Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo-text">PHOTOGRAPHY</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html" class="active">Home</a></li>
                    <li class="dropdown">
                        <a href="automotive.html" class="dropbtn">Galleries <span class="arrow">&#9662;</span></a>
                        <div class="dropdown-content">
                            <a href="automotive.html">Automotive</a>
                            <a href="nature.html">Nature</a>
                            <a href="animals.html">Animals</a>
                        </div>
                    </li>
                    <li><a href="#booking">Book Session</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>CAPTURING MOMENTS</h1>
            <p>Automotive, Nature, and Wildlife Photography</p>
            <a href="automotive.html" class="btn">View Galleries</a>
        </div>
    </section>

    <main class="portfolio-container">
        <section id="booking" class="booking-section">
            <div class="booking-header">
                <h2>Book a Session</h2>
                <p>Fill out the fields below to schedule a test shoot or feature.</p>
            </div>
            <form class="booking-form" onsubmit="event.preventDefault(); alert('Test Form Submitted Successfully!');">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>

                <div class="form-group-row">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="name@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="(403) 555-0123">
                    </div>
                </div>

                <div class="form-group">
                    <label for="location">Preferred Shoot Location</label>
                    <input type="text" id="location" name="location" placeholder="e.g., Downtown Parkade, Kananaskis, etc." required>
                </div>

                <div class="form-group">
                    <label for="notes">Shoot Details / Message</label>
                    <textarea id="notes" name="notes" rows="5" placeholder="Tell me about your car or what kind of project you have in mind..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Submit Request</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Photography. All Rights Reserved.</p>
    </footer>

</body>
</html>
